# CI runtime contract. Bazel platform/toolchain implementation truth lives under
# build/platforms and build/toolchains; OCI images here provide the Linux build
# environments that CI runs through Buildkite Docker jobs or Jenkins pods.
ci:
  if_changed:
    enabled: true
    run_all_branches:
      - main

  change_scopes:
    global:
      - .buildkite/**
      - build/ci/images.yaml

    cpp:
      - .bazelrc
      - .bazelversion
      - MODULE.bazel
      - MODULE.bazel.lock
      - build/ci/images/cpp-bazel/**
      - build/platforms/**
      - build/toolchains/**
      - lib/sample/**
      - progs/app/**
      - tools/buildifier/**

    java:
      - .mvn/**
      - build/ci/images/java-maven/**
      - components/sample/**
      - pom.xml

  registries:
    buildkite:
      ref_prefix: packages.buildkite.com/aallrd/monorepo-images
    jenkins:
      env: MONOREPO_OCI_REGISTRY
      docker_config_secret: monorepo-oci-docker-config
      kaniko_image: martizih/kaniko:v1.27.5-debug
      kubernetes_cloud: kubernetes

  images:
    cpp_bazel:
      name: cpp-bazel
      context: .
      dockerfile: build/ci/images/cpp-bazel/Dockerfile
      platform: linux/amd64
      runner:
        buildkite_queue: linux-medium

    java_maven:
      name: java-maven
      context: .
      dockerfile: build/ci/images/java-maven/Dockerfile
      platform: linux/amd64
      runner:
        buildkite_queue: linux-medium

  jobs:
    linux_gcc:
      label: ":bazel: linux_gcc"
      runner:
        buildkite_queue: linux-medium
      image: cpp_bazel
      change_scopes:
        - global
        - cpp
      commands:
        - bazel build //build/toolchains:validate_current_toolchain
        - bazel build //...
        - bazel test //...
        - ./tools/buildifier/check.sh

    linux_clang_ubsan:
      label: ":bazel: linux_clang_ubsan"
      runner:
        buildkite_queue: linux-large
      image: cpp_bazel
      change_scopes:
        - global
        - cpp
      commands:
        - bazel build --config=linux-clang //build/toolchains/clang_rhel_amd64:validate
        - bazel build --config=linux-clang-ubsan //...
        - bazel test --config=linux-clang-ubsan //...

    java_maven:
      label: ":maven: java_maven"
      runner:
        buildkite_queue: linux-medium
      image: java_maven
      change_scopes:
        - global
        - java
      commands:
        - mvn --batch-mode --no-transfer-progress verify
      reports:
        junit:
          - components/sample/target/surefire-reports/*.xml
      artifacts:
        - components/sample/target/surefire-reports/*.xml
        - components/sample/target/*.jar

local_development:
  macos_arm64:
    os: macos
    cpu: arm64
    bazel_config: macos
    toolchain:
      root: /opt/homebrew/Cellar/llvm/22.1.6
      compiler: Homebrew LLVM/Clang 22.1.6
      clang_config: /opt/homebrew/Cellar/llvm/22.1.6/etc/clang/arm64-apple-darwin25.cfg
      sdk: /Library/Developer/CommandLineTools/SDKs/MacOSX26.sdk

  windows_amd64:
    os: windows
    cpu: x86_64
    bazel_config: windows
    toolchain:
      root: C:/toolchains/msvc-windows-amd64
      compiler: Visual Studio 2022 Build Tools
      windows_sdk: REPLACE_WITH_WINDOWS_SDK_VERSION
